<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Cognitive Care</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A4DB8">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cognitive Care">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cc:#1A4DB8;--cc2:#12368A;--ccs:#E8EEF8;--ccm:#C2D0F0;
  --or:#E6610A;--ors:#FDEEE3;--orm:#F5C4A0;
  --rd:#C8302A;--rds:#FBEAEA;
  --gn:#1E7A4A;--gns:#E3F5EC;
  --yw:#C07A00;--yws:#FEF4DC;
  --pu:#6B3FA0;--pus:#F0EAF8;
  --ink:#161D2B;--ink2:#4A5568;--ink3:#8A96A3;
  --bg:#F3F6FD;--card:#fff;--line:#E2E8F0;
  --r:16px;--rs:12px;
  --sh:0 1px 3px rgba(26,77,184,.07),0 6px 20px -6px rgba(26,77,184,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;background:var(--cc);}
body{font-family:"Plus Jakarta Sans",-apple-system,sans-serif;color:var(--ink);display:flex;justify-content:center;}

/* ── Shell ── */
#shell{width:100%;max-width:480px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;}

/* ── Splash ── */
#splash{position:fixed;inset:0;z-index:200;background:var(--cc);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s;}
#splash.out{opacity:0;pointer-events:none;}
.sp-logo{width:100px;height:100px;background:#fff;border-radius:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 40px rgba(0,0,0,.2);margin-bottom:24px;}
.sp-name{font-size:24px;font-weight:800;color:#fff;}
.sp-sub{font-size:11px;color:rgba(255,255,255,.6);letter-spacing:.1em;text-transform:uppercase;margin-top:5px;}
.sp-bar{width:44px;height:3px;background:rgba(255,255,255,.2);border-radius:99px;margin-top:44px;overflow:hidden;}
.sp-bar::after{content:"";display:block;height:100%;background:#fff;animation:spload 1.5s ease forwards;}
@keyframes spload{from{width:0}to{width:100%}}

/* ── Auth ── */
#auth-screen{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:14px;}
#auth-screen.show{display:flex;}
.auth-logo{width:72px;height:72px;background:var(--cc);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.auth-title{font-size:22px;font-weight:800;color:var(--cc);text-align:center;}
.auth-sub{font-size:13px;color:var(--ink2);text-align:center;margin-bottom:4px;}
.role-btn{width:100%;max-width:340px;background:#fff;border:2px solid var(--line);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.role-btn:active{border-color:var(--cc);box-shadow:0 0 0 3px var(--ccs);}
.role-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none;}
.role-btn b{font-size:14px;display:block;}
.role-btn small{font-size:11.5px;color:var(--ink2);}

/* ── Header ── */
header{background:var(--cc);color:#fff;padding:13px 15px 11px;position:sticky;top:0;z-index:30;box-shadow:0 4px 16px -8px rgba(26,77,184,.45);}
.hrow{display:flex;align-items:center;gap:9px;}
.hico{width:30px;height:30px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none;}
.htit{flex:1;line-height:1.1;}
.htit b{font-size:15px;font-weight:800;}
.htit small{font-size:10px;color:rgba(255,255,255,.65);letter-spacing:.05em;text-transform:uppercase;display:block;}
.hbadge{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:999px;border:1.5px solid rgba(255,255,255,.25);font-size:11px;font-weight:700;cursor:pointer;}
.hdot{width:7px;height:7px;border-radius:50%;}
.hrole{background:rgba(255,255,255,.12);border-radius:999px;padding:3px 8px;font-size:10px;font-weight:700;color:rgba(255,255,255,.8);margin-top:7px;display:inline-block;}

/* ── Nav ── */
nav{position:sticky;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);padding:5px 0 calc(6px + env(safe-area-inset-bottom));}
nav button{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;color:var(--ink3);padding:5px 2px;font-family:"Plus Jakarta Sans";position:relative;}
nav button.active{color:var(--cc);}
nav button svg{width:19px;height:19px;}
.nb{position:absolute;top:2px;right:50%;transform:translateX(8px);background:var(--rd);color:#fff;font-size:8.5px;font-weight:800;border-radius:999px;padding:1px 4px;min-width:14px;text-align:center;}

/* ── Main ── */
main{flex:1;overflow-y:auto;padding:13px 13px 100px;-webkit-overflow-scrolling:touch;}
.view{display:none;animation:fi .2s ease;}
.view.active{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── Components ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px;}
h1.pg{font-size:19px;font-weight:800;color:var(--cc);margin-bottom:2px;}
p.sub{font-size:12.5px;color:var(--ink2);margin-bottom:13px;line-height:1.4;}
h2.sh{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:9px;display:flex;align-items:center;gap:6px;}
.ey{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cc);margin-bottom:3px;}
.divider{height:1px;background:var(--line);margin:10px 0;}
.row{display:flex;align-items:center;gap:8px;}
.rb{display:flex;align-items:center;justify-content:space-between;gap:8px;}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;border-radius:var(--rs);font-weight:700;font-size:13.5px;font-family:"Plus Jakarta Sans";padding:11px 14px;width:100%;transition:opacity .1s;}
.btn:active{opacity:.82;}
.bcc{background:var(--cc);color:#fff;}
.bor{background:var(--or);color:#fff;}
.brd{background:var(--rd);color:#fff;}
.bgh{background:var(--ccs);color:var(--cc);}
.bout{background:#fff;color:var(--cc);border:1.5px solid var(--line);}
.bsm{padding:7px 11px;font-size:12px;width:auto;border-radius:9px;}
a.btn{text-decoration:none;}

/* Pills */
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:11px;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none;}
.pill{flex:none;padding:7px 13px;border-radius:999px;font-size:12px;font-weight:700;background:#fff;border:1.5px solid var(--line);color:var(--ink2);cursor:pointer;}
.pill.on{background:var(--cc);border-color:var(--cc);color:#fff;}

/* Inputs */
input,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:9px 11px;font-family:"Plus Jakarta Sans";font-size:13.5px;color:var(--ink);background:#fff;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--cc);box-shadow:0 0 0 3px var(--ccs);}
textarea{resize:vertical;min-height:50px;}
.fl{margin-bottom:10px;}
.fl label{font-size:11px;font-weight:700;color:var(--ink2);display:block;margin-bottom:4px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* Seg */
.seg{display:grid;gap:5px;}
.seg.s2{grid-template-columns:1fr 1fr;}
.seg.s3{grid-template-columns:1fr 1fr 1fr;}
.seg button{border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:7px 3px;font-size:10.5px;font-weight:700;color:var(--ink2);cursor:pointer;line-height:1.25;font-family:"Plus Jakarta Sans";}
.seg button.a0{background:var(--gns);border-color:var(--gn);color:var(--gn);}
.seg button.a1{background:var(--yws);border-color:var(--yw);color:var(--yw);}
.seg button.a2{background:var(--rds);border-color:var(--rd);color:var(--rd);}

/* Checkbox */
.cr{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
.cr:last-child{border:none;}
.cb{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;}
.cb.ok{background:var(--gn);border-color:var(--gn);}
.cb.warn{background:var(--yw);border-color:var(--yw);}
.cb.alert{background:var(--rd);border-color:var(--rd);}
.cb svg{width:12px;height:12px;stroke:#fff;display:none;}
.cb.ok svg,.cb.warn svg,.cb.alert svg{display:block;}
.cl{font-size:13px;line-height:1.4;flex:1;padding-top:1px;}
.cr.dn .cl{color:var(--ink2);text-decoration:line-through;}

/* Ring */
.ring{border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:5px solid var(--line);background:#fff;flex:none;}
.ring .rv{font-size:22px;font-weight:700;font-family:"IBM Plex Mono";line-height:1;}
.ring .rl{font-size:9px;color:var(--ink3);}

/* KPI */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--rs);padding:13px 11px;}
.kpi .kv{font-size:26px;font-weight:800;font-family:"IBM Plex Mono";line-height:1;}
.kpi .kl{font-size:10.5px;font-weight:600;color:var(--ink2);margin-top:3px;}
.kpi.kr{background:var(--rds);border-color:#f0c4c2;}
.kpi.kg{background:var(--gns);border-color:#b8dfc9;}
.kpi.ky{background:var(--yws);border-color:#f0dfa0;}

/* Step flow */
.step{border-left:4px solid var(--cc);background:var(--ccs);border-radius:11px;padding:11px 13px;}
.step.sw{border-color:var(--or);background:var(--ors);}
.step.sd{border-color:var(--rd);background:var(--rds);}
.step b{display:block;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--cc);margin-bottom:2px;}
.step.sw b{color:var(--or);}
.step.sd b{color:var(--rd);}
.step p{font-size:13px;line-height:1.4;}
.arr{text-align:center;color:var(--or);font-size:13px;padding:3px 0;}

/* Alert box */
.abox{border-radius:var(--rs);padding:11px 13px;margin-bottom:11px;}
.abox.acc{background:var(--ccs);border-left:4px solid var(--cc);}
.abox.aor{background:var(--ors);border-left:4px solid var(--or);}
.abox.ard{background:var(--rds);border-left:4px solid var(--rd);}
.abox.agn{background:var(--gns);border-left:4px solid var(--gn);}
.abox b{font-size:11.5px;font-weight:800;display:block;margin-bottom:3px;}
.abox p{font-size:12.5px;line-height:1.4;}

/* Accordion */
details.acc{border:1px solid var(--line);border-radius:var(--rs);margin-bottom:8px;background:#fff;overflow:hidden;}
details.acc summary{cursor:pointer;padding:12px 13px;font-weight:700;font-size:13px;color:var(--cc);display:flex;align-items:center;gap:7px;list-style:none;}
details.acc summary::-webkit-details-marker{display:none;}
details.acc summary .arr2{margin-left:auto;font-size:16px;color:var(--ink3);font-weight:400;transition:transform .2s;}
details.acc[open] summary .arr2{transform:rotate(45deg);}
details.acc .ab{padding:0 13px 13px;font-size:13px;line-height:1.5;}
details.acc .ab ul{padding-left:16px;margin-top:5px;}
details.acc .ab li{margin-bottom:4px;}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:10.5px;font-weight:700;}
.bcc2{background:var(--ccs);color:var(--cc);}
.bor2{background:var(--ors);color:var(--or);}
.brd2{background:var(--rds);color:var(--rd);}
.bgn2{background:var(--gns);color:var(--gn);}
.byw2{background:var(--yws);color:var(--yw);}
.bpu2{background:var(--pus);color:var(--pu);}

/* Table */
table.t{width:100%;border-collapse:collapse;font-size:12px;}
table.t th{text-align:left;background:var(--cc);color:#fff;padding:7px 7px;font-size:10.5px;font-weight:700;}
table.t td{padding:7px 7px;border-bottom:1px solid var(--line);vertical-align:top;}
table.t tr:nth-child(even) td{background:var(--bg);}

/* Benef card */
.bc{background:#fff;border:1px solid var(--line);border-radius:var(--rs);padding:12px 13px;margin-bottom:9px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.bc:active{background:var(--ccs);}
.bav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;font-size:15px;font-weight:800;color:#fff;}
.bc-info{flex:1;}
.bc-info b{font-size:13.5px;font-weight:700;display:block;}
.bc-info small{font-size:11px;color:var(--ink2);}

/* Msg */
.msg{border:1px dashed var(--line);border-radius:var(--rs);padding:11px 12px;background:var(--bg);font-size:12.5px;line-height:1.5;margin-bottom:8px;}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.mh b{font-size:12px;font-weight:800;color:var(--cc);}
.cpbtn{display:flex;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--line);color:var(--cc);font-size:10.5px;font-weight:700;padding:4px 8px;border-radius:999px;cursor:pointer;font-family:"Plus Jakarta Sans";}

/* Toast */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:#fff;padding:8px 16px;border-radius:999px;font-size:12.5px;font-weight:600;box-shadow:var(--sh);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:80;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.icoBtn{background:none;border:none;cursor:pointer;color:var(--ink3);padding:3px;}

/* Gauge */
.gw{display:flex;flex-direction:column;align-items:center;padding:4px 0 0;}
.gr{display:flex;flex-direction:column;align-items:center;margin-top:-48px;}
.gv{font-size:28px;font-weight:800;font-family:"IBM Plex Mono";line-height:1;}
.gl{font-size:11.5px;color:var(--ink2);margin-top:2px;text-align:center;max-width:200px;line-height:1.3;}
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px;}
.lo{border-radius:9px;padding:8px 3px;text-align:center;cursor:pointer;border:1.5px solid var(--line);background:#fff;}
.lo b{display:block;font-size:15px;font-weight:800;font-family:"IBM Plex Mono";}
.lo span{display:block;font-size:8.5px;font-weight:700;color:var(--ink3);margin-top:1px;line-height:1.2;}

/* Signature pad */
#sigpad{border:2px dashed var(--line);border-radius:var(--rs);background:#fff;touch-action:none;cursor:crosshair;display:block;width:100%;height:140px;}
#sigpad.signed{border-color:var(--gn);}

/* Photo */
.pz{border:2px dashed var(--line);border-radius:var(--rs);padding:14px;text-align:center;cursor:pointer;background:var(--bg);}
.pz input{display:none;}
.pz img{max-width:100%;border-radius:9px;margin-top:8px;}

/* Signal card */
.sc{background:#fff;border:1px solid var(--line);border-radius:var(--rs);padding:12px 13px;margin-bottom:8px;border-left:4px solid var(--line);}
.sc.s1{border-left-color:var(--yw);}
.sc.s2{border-left-color:var(--or);}
.sc.s3{border-left-color:var(--rd);}
.sc b{font-size:13px;font-weight:700;}
.sc small{font-size:11px;color:var(--ink2);display:block;margin-top:2px;}

/* EI */
.ei{background:#fff;border:1px solid var(--line);border-radius:var(--rs);padding:12px 13px;margin-bottom:8px;}
.ei .eit{font-size:13px;font-weight:700;}
.ei small{font-size:11px;color:var(--ink2);}

/* Telecol */
.tcol{background:#fff;border:1px solid var(--line);border-radius:var(--rs);padding:13px;margin-bottom:9px;}
.tcol .tcn{font-size:14px;font-weight:800;}
.tcol small{font-size:11.5px;color:var(--ink2);}
.tst{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;margin-top:6px;}

/* Empty */
.empty{text-align:center;color:var(--ink2);font-size:13px;padding:18px 8px;}
.empty b{display:block;color:var(--ink);font-size:13.5px;margin-bottom:3px;}
</style>

<!-- ══ Firebase Auth SDK ══ -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBxBD6ZZQi6YmRkpndqHNu2DcsoDfwnBW4",
  authDomain: "adonis-plan-canicule.firebaseapp.com",
  projectId: "adonis-plan-canicule",
  storageBucket: "adonis-plan-canicule.firebasestorage.app",
  messagingSenderId: "446516429386",
  appId: "1:446516429386:web:0920ef9cf8494253f5dcb3"
};
firebase.initializeApp(firebaseConfig);
window._auth = firebase.auth();
window._db = firebase.firestore();
// FCM — Notifications push
window._vapidKey = "BMmWpAwfWjUvhBQlZk63EuwZpvgzpHHjYafsBRvGtrVwOTV3WgzQHOzBAdQg6Yiui2mnI4L7eT46g_00jhCX9mU";
async function initNotifications(){
  try{
    if(!("Notification" in window)||!("serviceWorker" in navigator))return;
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){console.log("Notifications refusees");return;}
    const msg=firebase.messaging();
    const token=await msg.getToken({vapidKey:window._vapidKey});
    if(token){
      const uid=window._auth.currentUser?.uid;
      if(uid){
        await window._db.collection("users").doc(uid).set({fcmToken:token,updatedAt:new Date().toISOString()},{merge:true});
        console.log("Token FCM enregistre:",token.slice(0,20)+"...");
      }
    }
    msg.onMessage(payload=>{
      const {title,body}=payload.notification||{};
      if(title){
        new Notification(title,{body:body||"",icon:"icons/icon-192.png"});
      }
    });
  }catch(e){console.warn("FCM init error:",e);}
}
</script>

</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-logo">
    <svg width="62" height="62" viewBox="0 0 72 72" fill="none">
      <path d="M36 6L62 18v24c0 15-26 26-26 26S10 57 10 42V18z" fill="#1A4DB8"/>
      <polyline points="14,40 23,40 27,28 33,52 39,36 46,36 52,36 58,36" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>
  <div class="sp-name">Cognitive Care</div>
  <div class="sp-sub">Plateforme SAAD · HAS</div>
  <div class="sp-bar"></div>
</div>

<!-- AUTH — Firebase Email/Password -->
<div id="auth-screen">
  <div class="auth-logo">
    <svg width="44" height="44" viewBox="0 0 72 72" fill="none">
      <path d="M36 6L62 18v24c0 15-26 26-26 26S10 57 10 42V18z" fill="#fff"/>
      <polyline points="14,40 23,40 27,28 33,52 39,36 46,36 52,36 58,36" stroke="#1A4DB8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>
  <div class="auth-title">Cognitive Care</div>
  <div class="auth-sub">Connectez-vous à votre espace</div>

  <!-- Formulaire de connexion -->
  <div id="login-form" style="width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px;">
    <div style="display:flex;flex-direction:column;gap:4px;">
      <label style="font-size:12px;font-weight:700;color:var(--ink2)">Adresse e-mail</label>
      <input type="email" id="auth-email" placeholder="votre@email.com" style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;">
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;">
      <label style="font-size:12px;font-weight:700;color:var(--ink2)">Mot de passe</label>
      <input type="password" id="auth-pwd" placeholder="••••••••" style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;">

// ── Storage LOCAL (pour données de session et config)
function sg(k,fb){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch{return fb;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── Firestore helpers (données partagées entre appareils)
function getUserId(){return window._auth.currentUser?window._auth.currentUser.uid:null;}

async function fsSet(collection, docId, data){
  try{
    const uid=getUserId();if(!uid)return;
    await window._db.collection("users").doc(uid).collection(collection).doc(docId).set(data,{merge:true});
  }catch(e){console.warn("Firestore write error:",e);}
}

async function fsGet(collection, docId){
  try{
    const uid=getUserId();if(!uid)return null;
    const doc=await window._db.collection("users").doc(uid).collection(collection).doc(docId).get();
    return doc.exists?doc.data():null;
  }catch(e){console.warn("Firestore read error:",e);return null;}
}

async function fsGetAll(collection){
  try{
    const uid=getUserId();if(!uid)return[];
    const snap=await window._db.collection("users").doc(uid).collection(collection).get();
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){console.warn("Firestore list error:",e);return[];}
}

async function fsDelete(collection, docId){
  try{
    const uid=getUserId();if(!uid)return;
    await window._db.collection("users").doc(uid).collection(collection).doc(docId).delete();
  }catch(e){console.warn("Firestore delete error:",e);}
}

function fsListen(collection, callback){
  const uid=getUserId();if(!uid)return()=>{};
  return window._db.collection("users").doc(uid).collection(collection)
    .onSnapshot(snap=>{
      const items=snap.docs.map(d=>({id:d.id,...d.data()}));
      callback(items);
    },e=>console.warn("Firestore listen error:",e));
}
async function loadAll(){
  S.role=sg("cc-role",null);
  S.level=sg("cc-level",1);
  // Charger depuis Firestore si connecté
  const uid=getUserId();
  if(uid){
    try{
      const [benef,ivt,signals,ei,telegest,audit,contacts]=await Promise.all([
        fsGetAll("benef"),
        fsGetAll("ivt"),
        fsGetAll("signals"),
        fsGetAll("ei"),
        fsGetAll("telegest"),
        fsGet("settings","audit"),
        fsGet("settings","contacts"),
      ]);
      S.benef=benef||[];
      S.ivtList=ivt||[];
      S.signals=signals||[];
      S.ei=ei||[];
      S.telegest=telegest||[];
      S.audit=audit||{};
      S.contacts=contacts||{coord:"",astreinte:"",medecin:""};
      // Visite du jour
      const visit=await fsGet("visits",td());
      if(visit){S.visit=visit;}
      else{S.visit={date:td(),cl:{},surv:{},hyd:[],trans:[],obs:"",photo:null};}
    }catch(e){
      console.warn("Erreur chargement Firestore, fallback localStorage",e);
      S.benef=sg("cc-benef",[]);S.ivtList=sg("cc-ivt",[]);
      S.signals=sg("cc-signals",[]);S.ei=sg("cc-ei",[]);
      S.telegest=sg("cc-telegest",[]);S.audit=sg("cc-audit",{});
      S.contacts=sg("cc-contacts",{coord:"",astreinte:"",medecin:""});
    }
  } else {
    S.benef=sg("cc-benef",[]);S.ivtList=sg("cc-ivt",[]);
    S.signals=sg("cc-signals",[]);S.ei=sg("cc-ei",[]);
    S.telegest=sg("cc-telegest",[]);S.audit=sg("cc-audit",{});
    S.contacts=sg("cc-contacts",{coord:"",astreinte:"",medecin:""});

    if(v&&v.date===td())S.visit=v;
    else S.visit={date:td(),cl:{},surv:{},hyd:[],trans:[],obs:"",photo:null};
  }
}

// ── Gauge
function gaugeSVG(){
  const cx=130,cy=116,r=90;
  const arc=(s,e)=>{const a=d=>[(cx+r*Math.cos((d-90)*Math.PI/180)).toFixed(1),(cy+r*Math.sin((d-90)*Math.PI/180)).toFixed(1)];const[x1,y1]=a(s);const[x2,y2]=a(e);return"M"+x1+" "+y1+" A"+r+" "+r+" 0 0 1 "+x2+" "+y2;};
  const segs=[[-90,-45,1],[-45,0,2],[0,45,3],[45,90,4]];
  const arcs=segs.map(([s,e,l])=>"<path d=\""+arc(s,e)+"\" stroke=\""+LC[l]+"\" stroke-width=\"14\" fill=\"none\" stroke-linecap=\"round\" opacity=\""+(S.level===l?1:0.25)+"\"/>").join("");
  const ca={1:-67.5,2:-22.5,3:22.5,4:67.5};
  const na=(ca[S.level]-90)*Math.PI/180;
  return"<svg width=\"260\" height=\"136\" viewBox=\"0 0 260 136\">"+arcs+"<g style=\"transform:rotate("+ca[S.level]+"deg);transform-origin:"+cx+"px "+cy+"px\"><line x1=\""+cx+"\" y1=\""+cy+"\" x2=\""+cx+"\" y2=\""+(cy-r+18)+"\" stroke=\""+LC[S.level]+"\" stroke-width=\"3.5\" stroke-linecap=\"round\"/><circle cx=\""+cx+"\" cy=\""+cy+"\" r=\"6.5\" fill=\""+LC[S.level]+"\"/><circle cx=\""+cx+"\" cy=\""+cy+"\" r=\"2.5\" fill=\"#fff\"/></g></svg>";
}

  return`<div class="card">
  <div class="rb" style="margin-bottom:10px"><h2 class="sh" style="margin:0">${f.id?"Modifier":"Nouveau"} bénéficiaire IVT</h2>${f.id?"<button class=\"btn bout bsm\" id=\"ivtCancel\">Annuler</button>":""}</div>
  <div class="fl"><label>Nom / repère</label><input id="ivtName" placeholder="Ex. Mme R. — secteur Nord" value="${esc(f.name)}">
  ${S.benef.length>0?"<select id=\"ivtBenef\" style=\"margin-top:6px\"><option value=\"\">Lier à un bénéficiaire...</option>"+S.benef.map(b=>"<option value=\""+b.id+"\""+( f.benefId===b.id?" selected":"")+">"+esc(b.prenom||"")+" "+esc(b.nom||"")+"</option>").join("")+"</select>":""}
  </div>
  ${IVT_CR.map(c=>"<div class=\"fl\"><label>"+c.l+"</label><div class=\"seg s3\" data-ck=\""+c.k+"\">"+c.o.map((o,i)=>"<button class=\""+(f[c.k]===i?"a"+i:"")+"\" data-val=\""+i+"\">"+o+"</button>").join("")+"</div></div>").join("")}
  <div class="row" style="margin:11px 0">
    <div class="ring" style="width:72px;height:72px;border-color:${inf.c}"><span class="rv" style="color:${inf.c}">${sc}</span><span class="rl">/10</span></div>
    <div style="flex:1;padding-left:11px"><div style="font-weight:800;color:${inf.c};font-size:13px">${inf.l}</div><div style="font-size:11.5px;color:var(--ink2);margin-top:3px">${sc<=2?"Visite habituelle":sc<=5?"Contrôle hydratation à chaque passage":sc<=8?"Passage renforcé dès le niveau 3":"Surveillance rapprochée quotidienne dès le niveau 2"}</div></div>
  </div>
  <button class="btn bcc" id="ivtSave">${f.id?"Enregistrer":"Ajouter"}</button>

<h2 class="sh">Bénéficiaires (${sorted.length})</h2>
<div class="card" style="padding:6px 13px">
${sorted.length===0?"<div class=\"empty\"><b>Aucun bénéficiaire</b>Ajoutez une fiche ci-dessus.</div>":
sorted.map(item=>{const s=ivtSc(item);const inf2=ivtInfo(s);return"<div class=\"cr\" style=\"align-items:center\"><div class=\"ring\" style=\"width:44px;height:44px;border-width:4px;border-color:"+inf2.c+"\"><span class=\"rv\" style=\"font-size:14px;color:"+inf2.c+"\">"+s+"</span></div><div style=\"flex:1;padding-left:6px\" data-editivt=\""+item.id+"\"><b style=\"font-size:13px\">"+esc(item.name||"Sans nom")+"</b><div style=\"font-size:11px;color:"+inf2.c+";font-weight:700\">"+inf2.l+"</div></div><button class=\"icoBtn\" data-delivt=\""+item.id+"\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 6h18\"/><path d=\"M8 6V4h8v2\"/><path d=\"M6 6l1 14h10l1-14\"/></svg></button></div>";}).join("")}
</div>`;
}

function cVisite(){
  const t=S.vtab;
  const cats=[["cl","Check-list"],["surv","Surveillance"],["hyd","Hydratation"],["trans","Transmission"]];
  return"<div class=\"pills\">"+cats.map(([k,l])=>"<div class=\"pill "+(t===k?"on":"")+"\" data-vtab=\""+k+"\">"+l+"</div>").join("")+"</div>"+
  (t==="cl"?vCL():t==="surv"?vSurv():t==="hyd"?vHyd():vTrans());
}

function vCL(){
  const cats=[...new Set(CHECKLIST_ITEMS.map(i=>i.cat))];
  const done=Object.keys(S.visit.cl||{}).length;
  let html="<div class=\"rb\" style=\"margin-bottom:10px\"><span style=\"font-size:13px;font-weight:700\">Progression</span><span class=\"badge bcc2\">"+(done)+" / "+CHECKLIST_ITEMS.length+"</span></div>";
  for(const cat of cats){
    html+="<div class=\"card\"><h2 class=\"sh\">"+cat+"</h2>";
    html+=CHECKLIST_ITEMS.filter(i=>i.cat===cat).map(i=>"<div class=\"cr "+(S.visit.cl[i.id]?"dn":"")+"\"><div class=\"cb "+(S.visit.cl[i.id]?"ok":"")+"\" data-chk=\""+i.id+"\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 13l4 4L19 7\"/></svg></div><span class=\"cl\">"+i.label+"</span></div>").join("");
    html+="</div>";
  }
  html+="<div class=\"card\"><h2 class=\"sh\">Observation & photo</h2><div class=\"fl\"><label>Notes libres</label><textarea id=\"obsGen\" rows=\"3\" placeholder=\"Observations générales de la visite…\">"+(S.visit.obs||"")+"</textarea></div><div class=\"pz\" id=\"pz\"><input type=\"file\" id=\"pzInput\" accept=\"image/*\" capture=\"environment\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--cc)\" stroke-width=\"2\"><rect x=\"3\" y=\"7\" width=\"18\" height=\"13\" rx=\"2\"/><path d=\"M16 7l-2-3H10L8 7\"/><circle cx=\"12\" cy=\"13\" r=\"3\"/></svg><p style=\"font-size:11.5px;color:var(--ink2);margin-top:5px\">Ajouter une photo (consentement requis)</p>"+(S.visit.photo?"<img src=\""+S.visit.photo+"\" alt=\"\">":"")+"</div><button class=\"btn bcc\" style=\"margin-top:10px\" id=\"saveObs\">Enregistrer l'observation</button></div>";
  return html;
}

function vSurv(){
  const hasA=Object.values(S.visit.surv||{}).some(v=>v===2);
  let html=hasA?"<div class=\"abox ard\"><b>🚨 Signe d'alerte</b><p>Au moins un indicateur est critique. Appliquez immédiatement le logigramme.</p><button class=\"btn brd\" style=\"margin-top:8px\" data-cstab=\"alerte\">Logigramme d'alerte</button></div>":"";
  html+="<div class=\"card\"><h2 class=\"sh\">Grille de surveillance</h2>";
  html+=SURV_IND.map(ind=>"<div class=\"fl\"><label>"+ind.l+"</label><div class=\"seg s3\" data-sk=\""+ind.k+"\">"+ind.o.map((o,i)=>"<button class=\""+(S.visit.surv[ind.k]===i?"a"+i:"")+"\" data-val=\""+i+"\">"+o+"</button>").join("")+"</div></div>").join("");
  html+="<p style=\"font-size:11px;color:var(--ink2);margin-top:3px\">Toute case rouge déclenche le logigramme d'alerte.</p></div>";
  return html;

  const rows=S.visit.hyd||[];

  +(rows.length===0?"<div class=\"empty\"><b>Aucune prise</b>Objectif : 1,5 L / jour</div>":"<table class=\"t\"><thead><tr><th>Heure</th><th>Boisson</th><th>Qté</th><th></th></tr></thead><tbody>"+rows.map(r=>"<tr><td>"+esc(r.h)+"</td><td>"+esc(r.b)+"</td><td>"+r.q+" ml</td><td><button class=\"icoBtn\" data-dh=\""+r.id+"\">✕</button></td></tr>").join("")+"</tbody></table>")
  +"</div>";
}

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  const m=document.getElementById("main");
  const sc=m._sc||0;
  if(S.tab==="home")       m.innerHTML=viewHome();
  else if(S.tab==="benef") m.innerHTML=viewBenef();
  else if(S.tab==="canicule") m.innerHTML=viewCanicule();
  else if(S.tab==="qualite")  m.innerHTML=viewQualite();
  else                        m.innerHTML=viewPlus();
  document.querySelectorAll("#tabbar button").forEach(b=>b.classList.toggle("active",b.dataset.tab===S.tab));
  renderHeader();
  attach();
  m.scrollTop=sc;m._sc=0;
  // Init sig pad si présent
  const sp=document.getElementById("sigpad");
  if(sp)initSig(sp);
}

/* ============================================================
   EVENTS
   ============================================================ */
function attach(){
  const m=document.getElementById("main");
  
  // Navigation interne
  m.querySelectorAll("[data-goto]").forEach(el=>el.addEventListener("click",()=>{
    S.tab=el.dataset.goto;
    if(el.dataset.cstab)S.caniculeTab=el.dataset.cstab;
    if(el.dataset.vtab)S.vtab=el.dataset.vtab;
    if(el.dataset.pstab)S.plusTab=el.dataset.pstab;
    if(el.dataset.qtab)S.qualTab=el.dataset.qtab;
    S.benefView=null;render();
  }));

  // Niveau vigilance
  m.querySelectorAll("[data-sl]").forEach(el=>el.addEventListener("click",()=>{
    S.level=parseInt(el.dataset.sl);ss("cc-level",S.level);
    fsSet("settings","level",{value:S.level});renderHeader();m._sc=m.scrollTop;render();
  }));

  // Tabs
  m.querySelectorAll("[data-cstab]").forEach(el=>el.addEventListener("click",()=>{
    S.caniculeTab=el.dataset.cstab;if(el.dataset.vtab)S.vtab=el.dataset.vtab;render();
  }));
  m.querySelectorAll("[data-vtab]").forEach(el=>el.addEventListener("click",()=>{
    S.vtab=el.dataset.vtab;render();
  }));
  m.querySelectorAll("[data-qtab]").forEach(el=>el.addEventListener("click",()=>{
    S.qualTab=el.dataset.qtab;render();
  }));
  m.querySelectorAll("[data-ptab]").forEach(el=>el.addEventListener("click",()=>{
    S.plusTab=el.dataset.ptab;render();
  }));

  // Bénéficiaires
  const nb=document.getElementById("newBenef");
  if(nb)nb.addEventListener("click",()=>{m.innerHTML=formBenef(null);attachBenefForm();});
  m.querySelectorAll("[data-viewb]").forEach(el=>el.addEventListener("click",()=>{S.benefView=el.dataset.viewb;render();}));
  m.querySelectorAll("[data-editivt]").forEach(el=>el.addEventListener("click",()=>{
    const it=S.ivtList.find(i=>i.id===el.dataset.editivt);
    if(it){S.ivtForm={...it,id:it.id};S.caniculeTab="ivt";window.scrollTo(0,0);render();}
  }));
  m.querySelectorAll("[data-delivt]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();S.ivtList=S.ivtList.filter(i=>i.id!==el.dataset.delivt);ss("cc-ivt",S.ivtList);toast("Supprimé");render();
  }));
  m.querySelectorAll("[data-editb]").forEach(el=>el.addEventListener("click",()=>{
    const b=S.benef.find(x=>x.id===el.dataset.bid);if(b){m.innerHTML=formBenef(b);attachBenefForm();}
  }));
  const editB=document.getElementById("editBenef");
  if(editB)editB.addEventListener("click",()=>{const b=S.benef.find(x=>x.id===editB.dataset.bid);if(b){m.innerHTML=formBenef(b);attachBenefForm();}});

  // Checklist visite
  m.querySelectorAll("[data-chk]").forEach(el=>el.addEventListener("click",()=>{
    const id=el.dataset.chk;
    S.visit.cl=S.visit.cl||{};
    if(S.visit.cl[id])delete S.visit.cl[id];else S.visit.cl[id]=true;
    saveV();m._sc=m.scrollTop;render();
  }));
  const obsEl=document.getElementById("obsGen");
  if(obsEl)obsEl.addEventListener("input",e=>{S.visit.obs=e.target.value;});
  const saveObs=document.getElementById("saveObs");
  if(saveObs)saveObs.addEventListener("click",()=>{saveV();toast("Enregistré");});
  const pz=document.getElementById("pz");const pzI=document.getElementById("pzInput");
  if(pz&&pzI){pz.addEventListener("click",()=>pzI.click());pzI.addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{S.visit.photo=ev.target.result;saveV();m._sc=m.scrollTop;render();};r.readAsDataURL(f);});}

  // Surveillance
  m.querySelectorAll("[data-sk]").forEach(g=>{g.querySelectorAll("button").forEach(btn=>btn.addEventListener("click",()=>{
    S.visit.surv=S.visit.surv||{};S.visit.surv[g.dataset.sk]=parseInt(btn.dataset.val);saveV();m._sc=m.scrollTop;render();
  }));});

  // Hydratation
  const hAdd=document.getElementById("hydAdd");
  if(hAdd)hAdd.addEventListener("click",()=>{
    const h=document.getElementById("hH").value.trim()||hhmm();
    const b=document.getElementById("hB").value;
    const q=document.getElementById("hQ").value||"0";
    const o=document.getElementById("hO").value.trim();
    S.visit.hyd=S.visit.hyd||[];S.visit.hyd.push({id:uid(),h,b,q,o});saveV();toast("Prise ajoutée");render();
  });
  m.querySelectorAll("[data-dh]").forEach(el=>el.addEventListener("click",()=>{
    S.visit.hyd=S.visit.hyd.filter(r=>r.id!==el.dataset.dh);saveV();render();
  }));

  // Transmission
  const trAdd=document.getElementById("trAdd");
  if(trAdd)trAdd.addEventListener("click",()=>{
    const b=document.getElementById("tB").value.trim();
    const o=document.getElementById("tO").value.trim();
    const a=document.getElementById("tA").value.trim();
    const d=document.getElementById("tD").value.trim();
    if(!o){toast("Décrivez l'observation");return;}
    S.visit.trans=S.visit.trans||[];S.visit.trans.push({id:uid(),h:hhmm(),b,o,a,d});saveV();toast("Enregistrée");render();
  });
  m.querySelectorAll("[data-dt]").forEach(el=>el.addEventListener("click",()=>{
    S.visit.trans=S.visit.trans.filter(r=>r.id!==el.dataset.dt);saveV();render();
  }));

  // IVT form
  const ivtN=document.getElementById("ivtName");
  if(ivtN)ivtN.addEventListener("input",e=>{S.ivtForm.name=e.target.value;});
  m.querySelectorAll("[data-ck]").forEach(g=>{g.querySelectorAll("button").forEach(btn=>btn.addEventListener("click",()=>{
    S.ivtForm[g.dataset.ck]=parseInt(btn.dataset.val);m._sc=m.scrollTop;render();
  }));});
  const ivtSv=document.getElementById("ivtSave");
  if(ivtSv)ivtSv.addEventListener("click",()=>{
    const f=S.ivtForm;
    const benSel=document.getElementById("ivtBenef");
    if(benSel)f.benefId=benSel.value||null;
    if(f.id){const idx=S.ivtList.findIndex(i=>i.id===f.id);if(idx>-1)S.ivtList[idx]={...f};}
    else S.ivtList.push({...f,id:uid()});
    const lastIvt=S.ivtList[S.ivtList.length-1];
    if(lastIvt){fsSet("ivt",lastIvt.id,lastIvt);}
    ss("cc-ivt",S.ivtList);S.ivtForm={id:null,name:"",age:0,aut:0,pat:0,iso:0,log:0};toast("Enregistré");render();
  });
  const ivtCa=document.getElementById("ivtCancel");
  if(ivtCa)ivtCa.addEventListener("click",()=>{S.ivtForm={id:null,name:"",age:0,aut:0,pat:0,iso:0,log:0};render();});

  // Signaux
  let siNiv=1;
  m.querySelectorAll("#siNiv button").forEach(btn=>{btn.addEventListener("click",()=>{
    siNiv=parseInt(btn.dataset.val);
    m.querySelectorAll("#siNiv button").forEach((b,i)=>{b.className=b.dataset.val==siNiv?"a"+(siNiv-1):"";});
  });});
  const siSave=document.getElementById("siSave");
  if(siSave)siSave.addEventListener("click",()=>{
    const t=document.getElementById("siType").value;
    const d=document.getElementById("siDesc").value.trim();
    const a=document.getElementById("siAction").value.trim();
    const bid=document.getElementById("siBenef").value;
    if(!t){toast("Sélectionnez un type de signal");return;}
    S.signals.push({id:uid(),date:td(),type:t,niveau:siNiv,desc:d,action:a,benefId:bid||null,closed:false});
    const lastSig=S.signals[S.signals.length-1];
    if(lastSig){
      fsSet("signals",lastSig.id,lastSig);
      if(lastSig.niveau>=2&&Notification.permission==="granted"){
        new Notification("⚠️ Signal "+lastSig.niveau+" déclaré — Cognitive Care",{
          body:"Type : "+lastSig.type+". Consultez l'onglet Qualité.",
          icon:"icons/icon-192.png"
        });
      }
    }
    ss("cc-signals",S.signals);toast("Signal enregistré");renderHeader();render();
  });
  m.querySelectorAll("[data-closesig]").forEach(el=>el.addEventListener("click",()=>{
    const s=S.signals.find(x=>x.id===el.dataset.closesig);if(s)s.closed=true;const closedSig=S.signals.find(x=>x.id===el.dataset.closesig);
    if(closedSig){fsSet("signals",closedSig.id,closedSig);}
    ss("cc-signals",S.signals);toast("Signal clôturé");render();
  }));

  // EI
  let eiGrav=1;
  m.querySelectorAll("#eiGrav button").forEach(btn=>{btn.addEventListener("click",()=>{
    eiGrav=parseInt(btn.dataset.val);
    m.querySelectorAll("#eiGrav button").forEach((b,i)=>{b.className=b.dataset.val==eiGrav?"a"+(eiGrav-1):"";});
  });});
  const eiSave=document.getElementById("eiSave");
  if(eiSave)eiSave.addEventListener("click",()=>{
    const t=document.getElementById("eiType").value;
    const d=document.getElementById("eiDesc").value.trim();
    const ms=document.getElementById("eiMesures").value.trim();
    const dt=document.getElementById("eiDate").value;
    const bid=document.getElementById("eiBenef").value;
    if(!t){toast("Sélectionnez un type d'EI");return;}
    S.ei.push({id:uid(),date:dt||td(),type:t,grav:eiGrav,desc:d,mesures:ms,benefId:bid||null,closed:false});
    const lastEi=S.ei[S.ei.length-1];
    if(lastEi){
      fsSet("ei",lastEi.id,lastEi);
      if(lastEi.grav>=2&&Notification.permission==="granted"){
        new Notification("🚨 Événement indésirable — Cognitive Care",{
          body:"Type : "+lastEi.type+" (gravité "+lastEi.grav+"). Action requise.",
          icon:"icons/icon-192.png"
        });
      }
    }
    ss("cc-ei",S.ei);toast("EI enregistré");renderHeader();render();
  });
  m.querySelectorAll("[data-closeei]").forEach(el=>el.addEventListener("click",()=>{
    const e=S.ei.find(x=>x.id===el.dataset.closeei);if(e)e.closed=true;ss("cc-ei",S.ei);toast("EI clôturé");render();
  }));

  // Audit
  m.querySelectorAll("[data-aud]").forEach(el=>el.addEventListener("click",()=>{
    const i=el.dataset.aud;S.audit[i]=!S.audit[i];ss("cc-audit",S.audit);fsSet("settings","audit",S.audit);render();
  }));

  // Télégestion
  const pE=document.getElementById("pointEntree");
  if(pE)pE.addEventListener("click",()=>{
    const lieu=document.getElementById("ptLieu").value;
    S.telegest.push({id:uid(),date:td(),debut:hhmm(),fin:null,lieu,sig:null});
    ss("cc-telegest",S.telegest);
    const activeTele=S.telegest.find(t=>t.date===td()&&!t.fin);
    if(activeTele){fsSet("telegest",activeTele.id,activeTele);}
    toast("Pointage d'entrée enregistré");render();
  });
  const pS=document.getElementById("pointSortie");
  if(pS)pS.addEventListener("click",()=>{
    const active=S.telegest.find(t=>t.date===td()&&!t.fin);
    if(active){active.fin=hhmm();ss("cc-telegest",S.telegest);
    if(active){fsSet("telegest",active.id,active);}
    toast("Pointage de sortie enregistré");render();}
  });

  // Signature
  const sigSave=document.getElementById("sigSave");
  if(sigSave)sigSave.addEventListener("click",()=>{
    const sp=document.getElementById("sigpad");
    if(sp&&S.sigPoints&&S.sigPoints.length>5){
      const active=S.telegest.find(t=>t.date===td()&&!t.fin)||S.telegest.slice().reverse().find(t=>t.date===td());
      if(active){active.sig=sp.toDataURL();ss("cc-telegest",S.telegest);}
      toast("Signature enregistrée");
    }else toast("Veuillez signer dans le cadre");
  });
  const sigCl=document.getElementById("sigClear");
  if(sigCl)sigCl.addEventListener("click",()=>{
    const sp=document.getElementById("sigpad");
    if(sp&&S.sigCtx){S.sigCtx.clearRect(0,0,sp.width,sp.height);sp.classList.remove("signed");S.sigPoints=[];}
  });

  // Messages
  m.querySelectorAll("[data-cp]").forEach(el=>el.addEventListener("click",()=>copyText(MESSAGES[parseInt(el.dataset.cp)].b)));

  // Contacts
  const sCont=document.getElementById("saveContacts");
  if(sCont)sCont.addEventListener("click",()=>{
    S.contacts={coord:document.getElementById("cCoord").value.trim(),astreinte:document.getElementById("cAstr").value.trim(),medecin:document.getElementById("cMed").value.trim()};
    ss("cc-contacts",S.contacts);fsSet("settings","contacts",S.contacts);toast("Contacts enregistrés");render();
  });

  // Profil
  const chg=document.getElementById("chgRole");
  if(chg)chg.addEventListener("click",()=>{logoutFirebase();});
  const rst=document.getElementById("resetAll");
  if(rst)rst.addEventListener("click",()=>{
    if(!confirm("Réinitialiser toutes les données Cognitive Care ?"))return;
    ["cc-role","cc-level","cc-benef","cc-ivt","cc-signals","cc-ei","cc-telegest","cc-audit","cc-contacts","cc-visit"].forEach(k=>localStorage.removeItem(k));
    location.reload();
  });

  // Export HAS
  const exp=document.getElementById("exportHAS");
  if(exp)exp.addEventListener("click",()=>{
    const rapport=`RAPPORT DE SYNTHÈSE — COGNITIVE CARE
Date : ${new Date().toLocaleDateString("fr-FR")}
Niveau de vigilance canicule : N${S.level} — ${LN[S.level]}

BÉNÉFICIAIRES : ${S.benef.length}
Grilles IVT renseignées : ${S.ivtList.length}
Bénéficiaires à IVT élevé/majeur : ${S.ivtList.filter(i=>ivtSc(i)>=6).length}

SIGNAUX FAIBLES : ${S.signals.length} déclarés (${S.signals.filter(s=>!s.closed).length} ouverts)
ÉVÉNEMENTS INDÉSIRABLES : ${S.ei.length} déclarés (${S.ei.filter(e=>!e.closed).length} ouverts)

AUDIT HAS : ${AUDIT_QS.filter((_,i)=>S.audit[i]).length}/${AUDIT_QS.length} critères validés

Généré par Cognitive Care — Plateforme SAAD HAS`;
    const blob=new Blob([rapport],{type:"text/plain;charset=utf-8"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="rapport_has_"+td()+".txt";a.click();
    toast("Rapport généré !");
  });
}

// ── Bénéficiaire form events
function attachBenefForm(){
  const m=document.getElementById("main");
  let selectedPatho=[];
  m.querySelectorAll("[data-patho]").forEach(el=>el.addEventListener("click",()=>{
    const p=el.dataset.patho;
    if(selectedPatho.includes(p)){selectedPatho=selectedPatho.filter(x=>x!==p);el.classList.remove("on");}
    else{selectedPatho.push(p);el.classList.add("on");}
  }));
  const savB=document.getElementById("saveBenef");
  if(savB)savB.addEventListener("click",()=>{
    const bid=savB.dataset.bid;
    const obj={
      prenom:document.getElementById("bPrenom").value.trim(),
      nom:document.getElementById("bNom").value.trim(),
      ddn:document.getElementById("bDdn").value,
      age:document.getElementById("bAge").value,
      adresse:document.getElementById("bAdresse").value.trim(),
      tel:document.getElementById("bTel").value.trim(),
      confiance:document.getElementById("bConfiance").value.trim(),
      gir:document.getElementById("bGir").value,
      apa:document.getElementById("bApa").value,
      pathologies:selectedPatho,
      traitements:document.getElementById("bTraite").value.trim(),
      projet:document.getElementById("bProjet").value.trim(),
      intervenants:document.getElementById("bInter").value.trim(),
      isolement:document.getElementById("bIsol").value,
    };
    if(!obj.nom&&!obj.prenom){toast("Renseignez au moins un nom");return;}
    if(bid){const idx=S.benef.findIndex(b=>b.id===bid);if(idx>-1)S.benef[idx]={...S.benef[idx],...obj};}
    else S.benef.push({...obj,id:uid()});
    // Sauvegarder dans Firestore
    const lastBenef=S.benef[S.benef.length-1]||S.benef.find(b=>b.id===bid);
    if(lastBenef){fsSet("benef",lastBenef.id,lastBenef);}
    ss("cc-benef",S.benef);S.benefView=null;toast("Bénéficiaire enregistré");S.tab="benef";render();
  });
  const canB=document.getElementById("cancelBenef");
  if(canB)canB.addEventListener("click",()=>{S.benefView=null;S.tab="benef";render();});
}

// ── Signature pad
function initSig(canvas){
  const ctx=canvas.getContext("2d");
  S.sigCtx=ctx;S.sigPoints=[];S.sigDrawing=false;
  canvas.width=canvas.offsetWidth||360;
  ctx.strokeStyle="#1A4DB8";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";
  const pos=(e)=>{const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(canvas.width/r.width),y:(t.clientY-r.top)*(canvas.height/r.height)};};
  canvas.addEventListener("mousedown",e=>{S.sigDrawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);S.sigPoints.push(p);});
  canvas.addEventListener("mousemove",e=>{if(!S.sigDrawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();S.sigPoints.push(p);});
  canvas.addEventListener("mouseup",()=>{S.sigDrawing=false;canvas.classList.add("signed");});
  canvas.addEventListener("touchstart",e=>{e.preventDefault();S.sigDrawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);S.sigPoints.push(p);},{passive:false});
  canvas.addEventListener("touchmove",e=>{e.preventDefault();if(!S.sigDrawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();S.sigPoints.push(p);},{passive:false});
  canvas.addEventListener("touchend",()=>{S.sigDrawing=false;canvas.classList.add("signed");});
}

// ── Auth Firebase
function showAuth(){
  document.getElementById("shell").style.display="none";
  document.getElementById("auth-screen").classList.add("show");
}
function hideAuth(){
  document.getElementById("auth-screen").classList.remove("show");
  document.getElementById("shell").style.display="flex";
}
function showAuthError(id, msg){
  const el=document.getElementById(id);
  el.textContent=msg;el.style.display="block";
  setTimeout(()=>el.style.display="none",4000);
}
function translateFirebaseError(code){
  const map={
    "auth/user-not-found":"Aucun compte trouvé avec cet email.",
    "auth/wrong-password":"Mot de passe incorrect.",
    "auth/invalid-email":"Adresse email invalide.",
    "auth/email-already-in-use":"Cet email est déjà utilisé.",
    "auth/weak-password":"Le mot de passe doit faire au moins 6 caractères.",
    "auth/too-many-requests":"Trop de tentatives. Réessayez dans quelques minutes.",
    "auth/invalid-credential":"Email ou mot de passe incorrect.",
  };
  return map[code]||"Une erreur est survenue. Réessayez.";
}

// Toggle login/register
document.getElementById("btn-show-register").addEventListener("click",()=>{
  document.getElementById("login-form").style.display="none";
  document.getElementById("register-form").style.display="flex";
});
document.getElementById("btn-show-login").addEventListener("click",()=>{
  document.getElementById("register-form").style.display="none";
  document.getElementById("login-form").style.display="flex";
});

// Connexion
document.getElementById("btn-login").addEventListener("click",async()=>{
  const email=document.getElementById("auth-email").value.trim();
  const pwd=document.getElementById("auth-pwd").value;
  if(!email||!pwd){showAuthError("auth-error","Remplissez tous les champs.");return;}
  const btn=document.getElementById("btn-login");
  btn.textContent="Connexion...";btn.disabled=true;
  try{
    await window._auth.signInWithEmailAndPassword(email,pwd);
    // onAuthStateChanged prendra le relais
  }catch(e){
    showAuthError("auth-error",translateFirebaseError(e.code));
    btn.textContent="Se connecter";btn.disabled=false;
  }
});

// Inscription
document.getElementById("btn-register").addEventListener("click",async()=>{
  const email=document.getElementById("reg-email").value.trim();
  const pwd=document.getElementById("reg-pwd").value;
  const role=document.getElementById("reg-role").value;
  if(!email||!pwd){showAuthError("reg-error","Remplissez tous les champs.");return;}
  const btn=document.getElementById("btn-register");
  btn.textContent="Création...";btn.disabled=true;
  try{
    const cred=await window._auth.createUserWithEmailAndPassword(email,pwd);
    // Sauvegarder le rôle dans localStorage (lié à l'uid)
    ss("cc-role-"+cred.user.uid, role);
    S.role=role;
    // onAuthStateChanged prendra le relais
  }catch(e){
    showAuthError("reg-error",translateFirebaseError(e.code));
    btn.textContent="Créer mon compte";btn.disabled=false;
  }
});

// Déconnexion (dans le profil)
function logoutFirebase(){
  window._auth.signOut().then(()=>{
    S.role=null;showAuth();
  });
}

// Observer l'état de connexion Firebase
window._auth.onAuthStateChanged(async user=>{
  if(user){
    const savedRole=sg("cc-role-"+user.uid, null);
    if(savedRole){S.role=savedRole;}
    else if(!S.role){S.role="auxiliaire";}
    ss("cc-role",S.role);
    // Charger les données depuis Firestore
    await loadAll();
    hideAuth();renderHeader();render();
    // Activer les notifications push
    setTimeout(initNotifications, 1000);
  } else {
    showAuth();
  }
});
document.getElementById("tabbar").addEventListener("click",e=>{
  const btn=e.target.closest("button[data-tab]");if(!btn)return;S.tab=btn.dataset.tab;S.benefView=null;render();
});

// ── Boot
// Boot géré par onAuthStateChanged — le splash reste jusqu'à la connexion
setTimeout(()=>{
  document.getElementById("splash").classList.add("out");
  setTimeout(()=>{try{document.getElementById("splash").remove();}catch(e){}},600);
},1800);

if("serviceWorker"in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
